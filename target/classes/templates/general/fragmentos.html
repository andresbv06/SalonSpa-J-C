<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo}">Salon y Spa J&C</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/rutinas.js}"></script>
    <style>
        :root {
            --color-primary: #3d2b1f;
            --color-accent: #b5665a;
            --color-accent-hover: #c97b6e;
            --color-bg: #e8ddd4;
            --color-bg-light: #f2ece6;
        }
        body { background-color: var(--color-bg); font-family: 'Georgia', serif; }
        .navbar-spa { background-color: var(--color-primary) !important; }
        .navbar-spa .navbar-brand { color: #e8ddd4 !important; font-size: 1.4rem; letter-spacing: 1px; }
        .navbar-spa .nav-link { color: #e8ddd4 !important; }
        .navbar-spa .nav-link:hover { color: var(--color-accent) !important; }
        .btn-gold { background-color: var(--color-accent); color: #fff; border: none; font-weight: bold; }
        .btn-gold:hover { background-color: var(--color-accent-hover); color: #fff; }
        .footer-spa { background-color: var(--color-primary); color: #e8ddd4; }
        .card { background-color: var(--color-bg-light) !important; }
        .table thead { background-color: var(--color-primary) !important; color: #e8ddd4 !important; }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-spa mb-0">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-scissors"></i> Salon y Spa J&amp;C
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/servicio/catalogo}">Servicios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cita/mis-citas}">Mis Citas</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/agenda}">
                        <i class="bi bi-calendar3"></i> Agenda
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/servicio/listado}">
                        <i class="bi bi-grid"></i> Admin
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn nav-link" style="color:#e8ddd4;">
                            <i class="bi bi-box-arrow-right"></i> Salir
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="mensajes" class="container mt-3">
    <div th:if="${todoOk}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${todoOk}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<footer th:fragment="footer" class="footer-spa text-center py-3 mt-5">
    <small>Salon y Spa J&amp;C &mdash; <span th:text="#{nombre.estudiante}">Andres Barrantes</span></small>
</footer>

</body>
</html>

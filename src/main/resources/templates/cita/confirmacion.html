<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Cita Confirmada')}"></head>
<body>
<nav th:replace="~{general/fragmentos :: navbar}"></nav>

<div class="container my-5" style="max-width:500px;">
    <div class="card border-0 shadow text-center p-5">
        <i class="bi bi-check-circle-fill" style="font-size:4rem; color:#c9a84c;"></i>
        <h2 class="mt-3" style="color:#1a1a1a;">&#161;Cita Confirmada!</h2>

        <div class="mt-4 p-3 rounded" style="background:#1a1a1a; color:#c9a84c;">
            <h4>Codigo: <strong th:text="${cita.codigo}">JC-00001</strong></h4>
        </div>

        <div class="mt-4 text-start">
            <p><i class="bi bi-scissors" style="color:#c9a84c;"></i>
                <strong> Servicio:</strong>
                <span th:text="${cita.servicio.nombre}"></span></p>
            <p><i class="bi bi-calendar" style="color:#c9a84c;"></i>
                <strong> Fecha:</strong>
                <span th:text="${cita.fechaCita}"></span></p>
            <p><i class="bi bi-clock" style="color:#c9a84c;"></i>
                <strong> Hora:</strong>
                <span th:text="${cita.horaCita}"></span></p>
            <p><i class="bi bi-person" style="color:#c9a84c;"></i>
                <strong> Nombre:</strong>
                <span th:text="${cita.nombre}"></span></p>
        </div>

        <a th:href="@{/cita/mis-citas}" class="btn btn-gold btn-lg mt-3 w-100">
            <i class="bi bi-list-check"></i> Ver Mis Citas
        </a>
    </div>
</div>

<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>

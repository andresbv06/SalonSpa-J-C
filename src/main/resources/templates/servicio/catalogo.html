<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Nuestros Servicios')}"></head>
<body>
<nav th:replace="~{general/fragmentos :: navbar}"></nav>

<div class="container my-5">
    <h2 class="text-center mb-1" style="color:#1a1a1a;">Nuestros Servicios</h2>
    <p class="text-center text-muted mb-5">Belleza y bienestar en un solo lugar</p>

    <div class="row g-4">
        <div class="col-md-4" th:each="srv : ${servicios}">
            <div class="card border-0 shadow-sm h-100">
                <div th:if="${srv.imagenServicio != null and !#strings.isEmpty(srv.imagenServicio)}">
                    <img th:src="${srv.imagenServicio}" class="card-img-top"
                         style="height:200px; object-fit:cover;" alt="imagen"/>
                </div>
                <div th:unless="${srv.imagenServicio != null and !#strings.isEmpty(srv.imagenServicio)}"
                     style="height:200px; background:#1a1a1a; display:flex; align-items:center; justify-content:center;">
                    <i class="bi bi-scissors" style="font-size:4rem; color:#c9a84c;"></i>
                </div>
                <div class="card-body text-center">
                    <span class="badge mb-2"
                          style="background-color:#c9a84c; color:#1a1a1a;"
                          th:text="${srv.categoria}">Categoria</span>
                    <h5 class="card-title" th:text="${srv.nombre}">Servicio</h5>
                    <p class="text-muted">
                        <i class="bi bi-clock"></i>
                        <span th:text="${srv.duracion}">60</span> min &nbsp;|&nbsp;
                        &#8353;<span th:text="${#numbers.formatInteger(srv.precio,1,'COMMA')}">0</span>
                    </p>
                    <a th:href="@{/cita/reservar(idServicio=${srv.idServicio})}"
                       class="btn btn-gold w-100">
                        <i class="bi bi-calendar-plus"></i> Reservar
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>

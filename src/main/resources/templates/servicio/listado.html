<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Admin - Servicios')}"></head>
<body>
<nav th:replace="~{general/fragmentos :: navbar}"></nav>
<div th:replace="~{general/fragmentos :: mensajes}"></div>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color:#1a1a1a;">
            <i class="bi bi-grid" style="color:#c9a84c;"></i> Admin - Servicios
        </h2>
        <button class="btn btn-gold" onclick="mostrarModalNuevo()">
            <i class="bi bi-plus-circle"></i> Nuevo Servicio
        </button>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead style="background:#1a1a1a; color:#c9a84c;">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Duracion</th>
                    <th>Categoria</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="srv : ${servicios}">
                    <td th:text="${srv.idServicio}"></td>
                    <td th:text="${srv.nombre}"></td>
                    <td>&#8353;<span th:text="${#numbers.formatInteger(srv.precio,1,'COMMA')}"></span></td>
                    <td th:text="${srv.duracion} + ' min'"></td>
                    <td th:text="${srv.categoria}"></td>
                    <td>
                        <a th:href="@{/servicio/modificar/{id}(id=${srv.idServicio})}"
                           class="btn btn-sm btn-warning">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <button class="btn btn-sm btn-danger"
                                th:onclick="'confirmarEliminar(' + ${srv.idServicio} + ')'">
                            <i class="bi bi-trash"></i> Eliminar
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Nuevo -->
<div class="modal fade" id="modalNuevo" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background:#1a1a1a;">
                <h5 class="modal-title" style="color:#c9a84c;">Nuevo Servicio</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formNuevo" th:action="@{/servicio/guardar}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" maxlength="50" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio (&#8353;)</label>
                        <input type="number" name="precio" class="form-control" step="0.01" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Duracion (min)</label>
                        <input type="number" name="duracion" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <input type="text" name="categoria" class="form-control" maxlength="30" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Imagen</label>
                        <input type="file" name="archivoImagen" class="form-control" accept="image/*"/>
                    </div>
                    <div class="modal-footer px-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                        <button type="submit" class="btn btn-gold">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal Eliminar -->
<div class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirmar Eliminacion</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">Esta seguro que desea eliminar este servicio?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-danger" onclick="ejecutarEliminar()">Eliminar</button>
            </div>
        </div>
    </div>
</div>

<form id="formEliminar" th:action="@{/servicio/eliminar}" method="post" style="display:none;">
    <input type="hidden" name="idServicio" id="idEliminar"/>
</form>

<footer th:replace="~{general/fragmentos :: footer}"></footer>
<script th:src="@{/js/rutinas.js}"></script>
</body>
</html>

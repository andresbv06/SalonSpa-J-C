<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Modificar Servicio')}"></head>
<body>
<nav th:replace="~{general/fragmentos :: navbar}"></nav>

<div class="container my-5" style="max-width:600px;">
    <h2 class="mb-4" style="color:#1a1a1a;">
        <i class="bi bi-pencil-square" style="color:#c9a84c;"></i> Modificar Servicio
    </h2>
    <div class="card border-0 shadow-sm p-4">
        <form th:action="@{/servicio/guardar}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="idServicio" th:value="${servicio.idServicio}"/>
            <input type="hidden" name="imagenServicio" th:value="${servicio.imagenServicio}"/>

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control"
                       th:value="${servicio.nombre}" maxlength="50" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Precio (&#8353;)</label>
                <input type="number" name="precio" class="form-control"
                       th:value="${servicio.precio}" step="0.01" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Duracion (min)</label>
                <input type="number" name="duracion" class="form-control"
                       th:value="${servicio.duracion}" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Categoria</label>
                <input type="text" name="categoria" class="form-control"
                       th:value="${servicio.categoria}" maxlength="30" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Imagen</label>
                <div th:if="${servicio.imagenServicio != null and !#strings.isEmpty(servicio.imagenServicio)}"
                     class="mb-2">
                    <img th:src="${servicio.imagenServicio}" style="max-height:100px;"/>
                </div>
                <input type="file" name="archivoImagen" class="form-control" accept="image/*"/>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-gold">
                    <i class="bi bi-check-circle"></i> Actualizar
                </button>
                <a th:href="@{/servicio/listado}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Regresar
                </a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
